services:
  backend:
    build: .
    container_name: subei-backend
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/app.db
      - JWT_SECRET=${JWT_SECRET:-subei-cooperative-secret-key-2024}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: nginx:alpine
    container_name: subei-frontend
    ports:
      - "8080:80"
    volumes:
      - ./dist:/usr/share/nginx/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    restart: unless-stopped
